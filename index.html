    <title>Espaço de Foco & Estudos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        header {
            background-color: #d4a373; /* Tom bronze/rose suave */

        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

            background-color: #ffffff;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

        }
        .container-topo {
            display: flex;

            justify-content: space-between;

        }

            width: 70px;
            height: 70px;
            object-fit: contain;
        }
        button {
            background-color: #b7b7a4; /* Verde sábia pastél */

            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #a3a380;
        }
        button span {
            font-weight: bold;
            margin-left: 8px;
        }
        .artigo-autor {
            font-weight: bold;
            color: #d4a373;
            font-size: 14px;
            margin-bottom: 15px;
        }
        ul {
            padding-left: 20px;
            line-height: 1.6;
        }
        li {
            margin-bottom: 10px;
        }
    </style>
</head>
